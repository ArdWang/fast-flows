name: fast_flows
description: "A light, modern and powerful Flutter framework combining state management, dependency injection, and route management - inspired by GetX but with a cleaner API."
version: 0.0.1
homepage: https://github.com/fast-flows/fast-flows
repository: https://github.com/fast-flows/fast-flows
issue_tracker: https://github.com/fast-flows/fast-flows/issues

environment:
  sdk: '>=3.2.3 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
